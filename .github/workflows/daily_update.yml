name: Daily RS Update

on:
  schedule:
    - cron: '0 21 * * 1-5'  # UTC 21:00 (US market close + 1hr), weekdays
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install ".[engine,pg]"

      - name: Run daily update
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m ibd_rs update

      - name: Export tickers CSV
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m ibd_rs export

      - name: Print status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m ibd_rs status

      - name: Commit updated tickers.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tickers.csv
          git diff --cached --quiet || git commit -m "Update tickers.csv $(date +%Y-%m-%d)"
          git push
